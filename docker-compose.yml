services:
  db:
    image: postgres:15
    container_name: game_market_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USE}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5488:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
