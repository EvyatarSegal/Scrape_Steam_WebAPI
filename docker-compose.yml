services:
  db:
    image: postgres:15
    container_name: game_market_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5488:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  etl:
    build: .
    container_name: game_market_etl
    restart: always
    command: python main.py --limit 0 --loop # Auto-start ETL on boot
    volumes:
      - .:/app
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - STEAM_API_KEY=${STEAM_API_KEY}
    depends_on:
      - db

volumes:
  postgres_data: